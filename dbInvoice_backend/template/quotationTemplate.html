<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: A4; margin: 0; }
    body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
    
    .page-wrapper {
      width: 210mm;
      height: 297mm;
      position: relative;
      page-break-after: always;
      overflow: hidden;
      background: white;
    }
    .letterhead-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      object-fit: cover;
    }
    .content-layer {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  {{PAGES}}
</body>
</html>
